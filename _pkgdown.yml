url: https://zeitr.circadia-lab.uk

template:
  bootstrap: 5
  bslib:
    # ── Colours (hex sticker palette) ────────────────────────────────────────
    # midnight #1C1A2E | amber #F0A500 | cream #E8D5B0
    # dusk purple #4A3F6B | burnt sienna #C25E2A
    bg:              "#F7F3ED"          # warm off-white (lightened cream)
    fg:              "#2D2640"          # deep dusk
    primary:         "#F0A500"          # amber
    secondary:       "#4A3F6B"          # dusk purple
    success:         "#C25E2A"          # burnt sienna
    info:            "#E8D5B0"          # cream
    warning:         "#F0A500"          # amber
    danger:          "#C25E2A"          # sienna

    # ── Fonts ─────────────────────────────────────────────────────────────────
    base_font:       {google: "DM Sans"}
    heading_font:    {google: "DM Sans"}
    code_font:       {google: "JetBrains Mono"}

    # ── Typography ────────────────────────────────────────────────────────────
    font-size-base:  "1rem"
    headings-font-weight: 700

    # ── Cards / surfaces ──────────────────────────────────────────────────────
    card-bg:         "#FFFCF7"          # warm white
    card-border-color: "#E8D5B0"        # cream
    card-border-radius: "0.75rem"

    # ── Code blocks ───────────────────────────────────────────────────────────
    pre-bg:          "#2D2640"          # deep dusk
    pre-color:       "#E8D5B0"          # cream

  includes:
    in_header: |
      <!-- Override pkgdown og:image with raster PNG for social sharing -->
      <meta property="og:image" content="https://zeitr.circadia-lab.uk/logo.png">
      <meta property="og:image:width" content="1080">
      <meta property="og:image:height" content="1080">
      <meta property="og:image:type" content="image/png">
      <meta name="twitter:card" content="summary">
      <meta name="twitter:image" content="https://zeitr.circadia-lab.uk/logo.png">
      <!-- Fathom - beautiful, simple website analytics -->
      <script src="https://cdn.usefathom.com/script.js" data-site="CKGXUGRT" defer></script>
      <!-- / Fathom -->
      <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#F0A500">
      <meta name="msapplication-TileColor" content="#2D2640">
      <meta name="theme-color" content="#2D2640">
      <style>
        /* ── Navbar ── */
        .navbar {
          background-color: #2D2640 !important;
          border-bottom: 2px solid #F0A500;
        }
        .navbar .navbar-brand,
        .navbar-nav .nav-link,
        .navbar-nav .nav-link:hover,
        .navbar .navbar-toggler-icon,
        .navbar form .btn {
          color: #E8D5B0 !important;
        }
        .navbar-nav .nav-link:hover { opacity: 0.8; }
        .navbar-nav .nav-link.active {
          color: #E8D5B0 !important;
          border-bottom: 2px solid #F0A500;
        }
        .navbar small.nav-text { color: #F0A500 !important; }

        /* ── Navbar logo size ── */
        .navbar-brand img { height: 40px; width: auto; }

        /* ── Remove border under page title ── */
        .page-header { border-bottom: none !important; }

        /* ── Sidebar TOC links ── */
        .sidebar .nav-link,
        .sidebar a,
        #toc a,
        #toc .nav-link {
          color: #1C1A2E !important;
        }
        .sidebar .nav-link:hover,
        .sidebar a:hover,
        #toc a:hover {
          color: #C25E2A !important;
        }
        .sidebar .nav-link.active,
        #toc .nav-link.active {
          color: #C25E2A !important;
          border-left: 2px solid #F0A500;
          font-weight: 600;
        }

        /* ── text-muted ── */
        .text-muted { color: #4A3F6B !important; }

        /* ── Sidebar border ── */
        .sidebar { border-left: 3px solid #F0A500; padding-left: 1rem; }

        /* ── Reference index section headers ── */
        .reference-index h2 {
          color: #C25E2A;
          font-size: 0.8rem;
          text-transform: uppercase;
          letter-spacing: 0.08em;
        }

        /* ── Inline code ── */
        code { color: #C25E2A; background: #F0E8D8;
          border-radius: 4px; padding: 0.1em 0.35em; }

        /* ── Links ── */
        a { color: #C25E2A; }
        a:hover { color: #F0A500; }

        /* ── Footer ── */
        .footer { background: #2D2640; color: #E8D5B0; padding: 1.5rem 0; }
        .footer a { color: #F0A500; }

        /* ── Search ── */
        #search-input { border-color: #F0A500; }

        /* ── Buttons ── */
        .btn-primary {
          background-color: #F0A500 !important;
          border-color: #F0A500 !important;
          color: #1C1A2E !important;
        }
        .btn-primary:hover {
          background-color: #C25E2A !important;
          border-color: #C25E2A !important;
        }
      </style>

logo: man/figures/logo.svg
favicon: man/figures/favicon.svg

opengraph:
  image:
    src: https://zeitr.circadia-lab.uk/logo.png
    alt: "zeitR - Actigraphy parsing and analysis for R"
  twitter:
    creator: "@circadia_lab"
    card: summary

home:
  title: "zeitR — Actigraphy parsing and analysis for R"
  description: >
    An R package for importing, parsing, and analysing raw actigraphy data.
    Computes standard rest-activity and circadian rhythm variables.
    Built by the Circadia Lab at Northumbria University.
  links:
  - text: Circadia Lab
    href: https://circadia-lab.uk
  sidebar:
    structure: [links, license, community, citation, authors, dev]

navbar:
  structure:
    left:  [intro, reference, articles, tutorials, news]
    right: [search, github]
  components:
    intro:
      text: Get started
      href: articles/getting-started.html
    github:
      icon: fab fa-github
      href: https://github.com/circadia-bio/zeitR
      aria-label: GitHub

reference:
- title: "Import"
  desc: "Read raw actigraphy files into R."
  contents:
  - starts_with("read_")

- title: "Prepare & validate"
  desc: "Prepare recordings for analysis and check data quality."
  contents:
  - prepare_actigraphy
  - check_consistency

- title: "Detection"
  desc: "Off-wrist, sleep period, and epoch-level scoring algorithms."
  contents:
  - detect_offwrist_bimodal
  - detect_sleep_crespo
  - detect_naps_crespo
  - score_epochs_cole_kripke
  - compute_waso

- title: "Circadian analysis"
  desc: "Non-parametric circadian rhythm variables."
  contents:
  - starts_with("compute_")

- title: "Study-level"
  desc: "Summarise results across multiple participants."
  contents:
  - study_summary

- title: "Pipeline"
  desc: "Run the full analysis pipeline on one file or a directory."
  contents:
  - run_pipeline
  - run_pipeline_batch
  - acttrust_params

- title: "Utilities"
  desc: "Helper functions for working with pipeline output."
  contents:
  - label_states

- title: "Package"
  desc: "Package-level documentation."
  contents:
  - zeitR-package

articles:
- title: "Getting started"
  navbar: ~
  contents:
  - getting-started
  - npcra
  - study-analysis

news:
  releases:
  - text: "Changelog"
    href: news/index.html

authors:
  Lucas França:
    href: https://orcid.org/0000-0003-0853-1319
  Mario Leocadio-Miguel:
    href: https://orcid.org/0000-0002-7248-3529

footer:
  structure:
    left: [package, developed_by]
    right: [built_with]
  components:
    package: >
      **zeitR** — Circadia Lab, Northumbria University.
    developed_by: >
      Lucas França & Mario Leocadio-Miguel.
