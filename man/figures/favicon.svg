<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <title>zeitR</title>

  <defs>
    <clipPath id="fc">
      <polygon points="256,16 424,112 424,304 256,400 88,304 88,112"/>
    </clipPath>
  </defs>

  <!-- Hex fill -->
  <polygon points="256,16 424,112 424,304 256,400 88,304 88,112"
           fill="#2D2640"/>

  <!-- zR centred in hex, no external font dependency -->
  <g clip-path="url(#fc)">
    <text x="256" y="284"
          text-anchor="middle"
          font-family="system-ui, -apple-system, sans-serif"
          font-size="188" font-weight="700"
          fill="#E8D5B0" letter-spacing="-6">z<tspan fill="#F0A500">R</tspan></text>
  </g>

  <!-- Hex border -->
  <polygon points="256,16 424,112 424,304 256,400 88,304 88,112"
           fill="none" stroke="#F0A500" stroke-width="10"/>
</svg>
